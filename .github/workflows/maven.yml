name: Maven CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: maven-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Verify and package
        run: mvn -B -ntp clean verify --file pom.xml

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: auctionapp-jars
          path: |
            auction-client/target/AuctionApp-*-Local-Client.jar
            auction-server/target/AuctionApp-*-Local-Server.jar
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Validate project version is not SNAPSHOT
        run: |
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version | tail -n 1)
          echo "Project version: $VERSION"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "::error::Project version is SNAPSHOT. Release is blocked."
            exit 1
          fi

      - name: Validate tag commit is on main history
        run: |
          git fetch origin main --no-tags --prune
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag commit is reachable from main."
          else
            echo "::error::Tag commit is not reachable from main. Release is blocked."
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: auctionapp-jars
          path: dist

      - name: Build production client jar
        run: |
          if [ -z "${{ vars.CLIENT_SERVER_HOST }}" ]; then
            echo "::error::CLIENT_SERVER_HOST repository variable is missing."
            exit 1
          fi

          if [ -z "${{ vars.CLIENT_SERVER_PORT }}" ]; then
            echo "::error::CLIENT_SERVER_PORT repository variable is missing."
            exit 1
          fi

          cat > auction-client/src/main/resources/client.properties <<EOF
          server.host=${{ vars.CLIENT_SERVER_HOST }}
          server.port=${{ vars.CLIENT_SERVER_PORT }}
          EOF

          echo "Production client.properties:"
          cat auction-client/src/main/resources/client.properties

          mvn -B -ntp clean package --file pom.xml -pl auction-client -am

          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version | tail -n 1)
          cp auction-client/target/AuctionApp-*-Local-Client.jar "dist/AuctionApp-${VERSION}.jar"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Downloads

            - `AuctionApp-*.jar`: main app for users. This connects to the public server.
            - `AuctionApp-*-Local-Client.jar`: local client for testing with a local server.
            - `AuctionApp-*-Local-Server.jar`: local server for local testing or deployment.

            Normal users should download `AuctionApp-*.jar`.
          files: |
            dist/auction-client/target/AuctionApp-*-Local-Client.jar
            dist/auction-server/target/AuctionApp-*-Local-Server.jar
            dist/AuctionApp-*.jar